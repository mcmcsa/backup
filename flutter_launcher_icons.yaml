flutter_launcher_icons:
  android:
    notification_icon: "launcher_notification"
    generate: true
  ios:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: "assets/images/psummsIcon.png"
  image_path_android: "assets/images/psummsIcon.png"
  image_path_ios: "assets/images/psummsIcon.png"
  image_path_macos: "assets/images/psummsIcon.png"
  image_path_windows: "assets/images/psummsIcon.png"
  
  # Adaptive icon for Android with white background
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/psummsIcon.png"

  # Web platform with white background
  web:
    generate: true
    image_path: "assets/images/flutter_icon.png"
    background_color: "#FFFFFF"

  # Color used for all generated icons - white background
  background_color: "#FFFFFF"
